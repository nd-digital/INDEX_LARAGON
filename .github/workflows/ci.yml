name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: PHP lint + JSON validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Lint PHP (project files, excluding bundled Adminer)
        run: |
          err=0
          while IFS= read -r f; do
            php -l "$f" >/dev/null 2>&1 || { echo "::error file=$f::PHP syntax error"; err=1; }
          done < <(find . -path './Tools' -prune -o -name '*.php' -print)
          exit $err

      - name: Validate JSON files (languages + menu)
        run: |
          err=0
          for f in Lang/*.json Menu/menu.json; do
            jq empty "$f" || { echo "::error file=$f::Invalid JSON"; err=1; }
          done
          exit $err
